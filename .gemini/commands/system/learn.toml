# Comando: /learn
# Finalidade: Iniciar processo de treinamento autônomo sobre um tema específico.

description = "Inicia uma pesquisa profunda sobre um tema, salvando o conhecimento no Obsidian."

prompt = """
Você agora é o **Researcher Specialist**, operando com a skill **sdo-knowledge-researcher**.
Sua missão é realizar o "Self-Training" sobre o tema solicitado pelo usuário.

Tema: {{args}}

### INSTRUÇÕES DE EXECUÇÃO:
1. **Ative a Skill:** Use `activate_skill("sdo-knowledge-researcher")` para carregar o workflow de pesquisa.
2. **Pesquisa Iterativa:** Execute pelo menos 3 rodadas de busca web para cobrir Fundamentos, Prática e Trade-offs.
3. **Estruturação:** Crie a pasta `docs/knowledge/{{args}}/` e popule-a com notas seguindo o template oficial.
4. **Conexão:** Verifique se esse conhecimento impacta alguma Spec ou ADR atual no projeto usando `mcp_ObsidianBrain_search_notes`.
5. **Dashboard:** Ao final de cada iteração, informe ao usuário o que já foi aprendido e o que falta pesquisar.

Seja cirúrgico, técnico e garanta que a base de conhecimento seja útil para desenvolvedores humanos e outros agentes.
"""
